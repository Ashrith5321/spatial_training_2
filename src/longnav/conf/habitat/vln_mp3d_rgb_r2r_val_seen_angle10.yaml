# @package _global_

defaults:
  - /habitat: habitat_config_base
  - /habitat/task: vln_r2r
  - /habitat/simulator/sensor_setups@habitat.simulator.agents.main_agent: rgbd_agent
  - /habitat/dataset/vln: mp3d_r2r
  - _self_

habitat:
  environment:
    max_episode_steps: 500
    iterator_options:
      shuffle: false
  simulator:
    turn_angle: 10
    agents:
      main_agent:
        sim_sensors:
          rgb_sensor:
            width: 640
            height: 480
            hfov: 79
            position: [0, 0.88, 0]
          depth_sensor:
            width: 640
            height: 480
            hfov: 79
            min_depth: 0.0
            max_depth: 5.0
            position: [0, 0.88, 0]
        height: 0.88
        radius: 0.18
    habitat_sim_v0:
      gpu_device_id: 0
      allow_sliding: True
  task: # zero out noise
    base_noise: 0.0
    base_angle_noise: 0.0
    reward_measure: distance_to_goal
    success_measure: success
    measurements:
      distance_to_goal:
        type: DistanceToGoal
        distance_to: POINT
      success:
        type: Success
        success_distance: 3.0
      spl:
        type: SPL
      oracle_success:
        type: OracleSuccess
        # success_distance: 3.0
      oracle_navigation_error:
        type: OracleNavigationError
  dataset:
    type: R2RVLN-v1
    split: val_seen
    scenes_dir: "/Projects/SG_VLN_HumanData/SG-VLN/data/scene_datasets"
    data_path: "/Projects/SG_VLN_HumanData/SG-VLN/sft_pipeline/vln_eval/data/r2r/val_seen/val_seen.json.gz"
    # content_scenes: ["*"]
    # content_scenes: ["17DRP5sb8fy"]