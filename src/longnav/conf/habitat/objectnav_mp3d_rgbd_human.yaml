# @package _global_

defaults:
  - /habitat: habitat_config_base
  - /habitat/task: objectnav
  - /habitat/simulator/sensor_setups@habitat.simulator.agents.main_agent: rgbd_agent
  - /habitat/dataset/objectnav: mp3d
  - _self_

habitat:
  environment:
    max_episode_steps: 500
    iterator_options:
      shuffle: false
  simulator:
    turn_angle: 30
    agents:
      main_agent:
        sim_sensors:
          rgb_sensor:
            width: 640
            height: 480
            hfov: 79
            position: [0, 0.88, 0]
          depth_sensor:
            width: 640
            height: 480
            hfov: 79
            min_depth: 0.0
            max_depth: 5.0
            position: [0, 0.88, 0]
        height: 0.88
        radius: 0.18
    habitat_sim_v0:
      gpu_device_id: 0
      allow_sliding: True
  task: # zero out noise
    base_noise: 0.0
    base_angle_noise: 0.0
    measurements:
      success:
        success_distance: 1.0
  dataset:
    data_path: "/Projects/SG_VLN_HumanData/SG-VLN/data/datasets/habitat-web/objectnav/objectnav_mp3d_thda_70k/train/train.json.gz"
    split: val
    scenes_dir: "/Projects/SG_VLN_HumanData/SG-VLN/data/scene_datasets"
    # content_scenes: ["*"]
    # content_scenes: ["17DRP5sb8fy"]