# @package _global_

resources:
  ray_address: local
  object_spilling_directory: ./ray_object_spilling
  vlm_resource_tag: env_a
  sim_resource_tag: env_b
  master_addr: localhost
  master_port: null
  num_vlms: 2
  num_sims: 3
  vlm_conda_env: vlm_node_1016
  habitat_conda_env: vln
  vlm_gpu_fraction: 0.7
  sim_gpu_fraction: 0.14
  vlm_cpus: 4
  sim_cpus: 4

rollout:
  max_steps: 10
  temperature: 1.0
  action_space_str: '[stop, forward, left, right, up, down]'
  system_prompt: ${read_text:conf/prompts/objectnav_prompt.txt}
  action_space:
  - stop
  - forward
  - left
  - right
  convo_start_template:
  - role: user
    content:
    - type: text
      text: ${rollout.system_prompt}
  - role: user
    content:
    - type: image
  - role: assistant
    content:
    - type: text
      text: '**forward**'
  convo_turn_template:
  - role: assistant
    content:
    - type: text
      text: '**$action**'
  - role: user
    content:
    - type: image
  - role: assistant
    content:
    - type: text
      text: '**forward**'
vlm:
  model_id: Phyllis1/qwen3_sft_sft_sparse_03drop_single_action_20260103_210803_ckpt10800
  attn_impl: flash_attention_2
  dtype: bfloat16
  vocab:
  - stop
  - forward
  - left
  - right
  offload_cache: false
  use_sparse: true
  save_outputs: true
sim:
  config_path: conf/habitat/hm3d_training.yaml
  dataset_path: null
  workspace: null
  scenes_dir: null
  split: val
  fp_guard: false
  fn_guard: false
  voxel_kwargs: null
  output_schema:
    obs:
      rgb: true
      instr_or_goal: true
      patch_coords: false
    info:
      episode_label: true
      spl: true
      soft_spl: true
      success: true
      distance_to_goal: true
    done: true
    reward: true
    stuck: true
    fp_stop: true
  auto_flush: false
  ep_seed: null
  explr_bonus: null
  collision_penalty: 0.02
task:
  run_name: test_critic_pretrain
  wandb_project: rebuttal_adv_baselines
  shard_size: 0
  subset_label: ''
  episode_json: ''
  output_dir: ./dump/critic_training
  jobtype: train
training:
  checkpoint: null
  load_optim: false
  load_sched: false
  learning_rate: 2.0e-06
  grad_accum_steps: 1
  mixed_precision: 'no'
  gradient_checkpointing: true
  total_optimization_steps: 5000
  warmup_steps: 32
  save_step: 8
  value_head_learning_rate: 0.0001
  value_head_dropout: 0.0
  value_head_dtype: float32
  value_head_hidden_dims:
  - 512
  peft_config:
    r: 128
    lora_alpha: 256
    lora_dropout: 0.0
    bias: none
    task_type: CAUSAL_LM
    target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
    modules_to_save: null
    use_rslora: false
  rl_config:
    use_value: true
    value_grad_scale: 1.0
    advantage_estimator: reinforce_plus_plus_time_kernel
    policy_loss_name: clip_cov
    n_rollout: 4
    n_adv: 256
    n_epoch: 2
    gamma: 0.95
    lam: 0.95
    time_kernel_sigma: 40.0
    time_alignment: start
    time_loto: false
    global_batch_info: {}
  sft_config: null
hab_config_list: null
