# @package _global_

defaults:
  - /habitat: habitat_config_base
  - /habitat/task: objectnav
  - /habitat/simulator/sensor_setups@habitat.simulator.agents.main_agent: rgb_agent
  - /habitat/dataset/objectnav: hm3d
  - _self_

habitat:
  environment:
    iterator_options:
      shuffle: false
    max_episode_steps: 500
  simulator:
    # --- [New] Motion Noise Configuration ---
    # Simulate motion noise of the robot
    # action_space_config: "pyrobotnoisy" 
    # action_space_config_arguments:
    #   noise_model:
    #     robot: "LoCoBot"       # Robot type
    #     controller: "Proportional"
    #     noise_multiplier: 0.5  # Noise intensity coefficient
    # ----------------------------------------
    step_physics: False
    kinematic_mode: True

    turn_angle: 30
    agents:
      main_agent:
        sim_sensors:
          rgb_sensor:
            width: 640
            height: 480
            hfov: 79
            position: [0, 0.88, 0]
            # --- [New] RGB Camera Noise ---
            # Simulate Gaussian noise of the RGB camera
            noise_model: "GaussianNoiseModel"
            noise_model_kwargs:
              intensity_constant: 0.07 # Noise intensity
            # ------------------------------
          # depth_sensor:
          #   width: 640
          #   height: 480
          #   hfov: 79
          #   # min_depth: 0.5 # default
          #   min_depth: 0.0
          #   max_depth: 5.0
          #   position: [0, 0.88, 0]
          #   # --- [New] Depth Camera Noise ---
          #   # Simulate noise characteristics of the Redwood depth sensor
          #   noise_model: "RedwoodDepthNoiseModel"
          #   noise_model_kwargs:
          #     noise_multiplier: 1.0
          #   # --------------------------------
          # semantic_sensor:
          #   width: 640
          #   height: 480
          #   hfov: 79
          #   position: [0, 0.88, 0]
        height: 0.88
        radius: 0.18
    habitat_sim_v0:
      gpu_device_id: 0
      allow_sliding: True # default is False, vln-game uses True whcih makes the task easier
      # override_scene_light_setup: True
      # scene_light_setup: "no_lights"
  task: # zero out noise
    base_noise: 1.0
    base_angle_noise: 1.0
    measurements:
      success:
        success_distance: 1.0 #0.5?
    count_obj_collisions: False
